name: Build Container Image
description: Build, push, sign, and attest a container image

inputs:
  target:
    required: false
    default: default
    description: Docker Bake build target
  image:
    required: false
    description: Full image name (e.g. org/repo)
    default: ${{ github.repository }}
  registry:
    required: false
    default: ghcr.io
    description: Container registry
  username:
    required: false
    description: Container registry username
    default: ${{ github.actor }}
  password:
    required: false
    description: Container registry password
    default: ${{ github.token }}
  default-branch:
    required: false
    default: ${{ github.event.repository.default_branch }}
    description: Default branch reference
  vars:
    required: false
    default: "{}"
    description: Additional environment variables in JSON format

runs:
  using: composite
  steps:
  - name: Export variables
    shell: bash
    env:
      VARS: ${{ inputs.vars }}
    run: echo "$VARS" | yq -r 'to_entries | map("\(.key)=\(.value)") | .[]' >> "$GITHUB_ENV"

  - name: Checkout
    uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

  - name: Install Cosign
    uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

  - name: Login to Container Registry
    uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
    with:
      registry: ${{ inputs.registry }}
      username: ${{ inputs.username }}
      password: ${{ inputs.password }}

  - name: Generate metadata
    id: meta
    uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
    with:
      images: ${{ inputs.registry }}/${{ inputs.image }}
      flavor: |
        latest=${{ github.ref_name == inputs.default-branch }}
      tags: |
        type=semver,pattern=v{{version}},priority=990
        type=semver,pattern=v{{major}}.{{minor}},priority=980
        type=semver,pattern=v{{major}},priority=970
        type=sha

  - name: Build and push
    id: build
    uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
    with:
      push: true
      targets: ${{ inputs.target }}
      files: |
        ./docker-bake.hcl
        cwd://${{ steps.meta.outputs.bake-file }}
      set: |
        ${{ inputs.target }}.cache-from=type=registry,ref=${{ inputs.registry }}/${{ inputs.image }}:latest

  - name: Obtain image digest
    id: digest
    shell: bash
    env:
      BUILD_METADATA: ${{ steps.build.outputs.metadata }}
      TARGET: ${{ inputs.target }}
    run: |
      DIGEST=$(echo "$BUILD_METADATA" | jq -r ".\"$TARGET\".\"containerimage.digest\"")
      echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"

  - name: Sign image with Cosign
    shell: bash
    env:
      IMAGE_REF: ${{ inputs.registry }}/${{ inputs.image }}@${{ steps.digest.outputs.digest }}
    run: |
      cosign sign --yes "$IMAGE_REF"

  - name: Generate build provenance attestation
    uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
    with:
      subject-name: ${{ inputs.registry }}/${{ inputs.image }}
      subject-digest: ${{ steps.digest.outputs.digest }}
      push-to-registry: true

  - name: Generate SBOM with Syft
    uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
    with:
      image: ${{ inputs.registry }}/${{ inputs.image }}@${{ steps.digest.outputs.digest }}
      output-file: sbom.spdx.json

  - name: Generate SBOM attestation
    uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
    with:
      subject-name: ${{ inputs.registry }}/${{ inputs.image }}
      subject-digest: ${{ steps.digest.outputs.digest }}
      sbom-path: sbom.spdx.json
      push-to-registry: true
